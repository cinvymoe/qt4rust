# Cargo 交叉编译配置
# 用于将 Rust Qt 应用程序编译到 ARM32 Linux 平台

[target.armv7-unknown-linux-gnueabihf]
linker = "arm-linux-gnueabihf-gcc"

rustflags = [
    "-C", "link-arg=-Wl,-rpath-link,/usr/arm-linux-gnueabihf/lib",
]

[target.aarch64-unknown-linux-gnu]
linker = "aarch64-linux-gnu-gcc"

rustflags = [
    "-C", "link-arg=-Wl,-rpath-link,/usr/aarch64-linux-gnu/lib",
]

[env]
# Qt 6 库路径配置
# 开发环境（本机 x86_64 构建）
QT_QML_IMPORT_PATH = "/usr/lib/qt6/qml"
QT_PLUGIN_PATH = "/usr/lib/qt6/plugins"

[target.armv7-unknown-linux-gnueabihf.env]
PKG_CONFIG_ALLOW_CROSS = "1"
PKG_CONFIG_PATH = "/usr/lib/arm-linux-gnueabihf/pkgconfig"
PKG_CONFIG_SYSROOT_DIR = "/"

[target.aarch64-unknown-linux-gnu.env]
PKG_CONFIG_ALLOW_CROSS = "1"
PKG_CONFIG_PATH = "/usr/lib/aarch64-linux-gnu/pkgconfig"
PKG_CONFIG_SYSROOT_DIR = "/"

[build]
# 默认目标平台
# 开发时注释此行以使用本机架构（x86_64）
# 部署时可取消注释以默认构建 ARM32 版本
# target = "armv7-unknown-linux-gnueabihf"

# 并行编译任务数（根据 CPU 核心数调整，建议设置为核心数）
jobs = 20

# 增量编译（开发模式下加速重新编译）
incremental = true

[profile.dev]
# 开发模式优化：加快编译速度
opt-level = 0
debug = true
split-debuginfo = "unpacked"  # Linux 上加速调试信息生成
incremental = true

[profile.dev.package."*"]
# 依赖包使用基本优化，加快运行速度但不影响编译速度
opt-level = 1

# 使用更快的链接器（需要安装 mold 或 lld）
# 优先使用 mold（最快），其次 lld
[target.x86_64-unknown-linux-gnu]
linker = "clang"
rustflags = ["-C", "link-arg=-fuse-ld=mold"]

# 如果 mold 不可用，可以改用 lld：
# rustflags = ["-C", "link-arg=-fuse-ld=lld"]

# 或者使用传统的 lld（如果上面的不工作）：
# linker = "clang"
# rustflags = ["-C", "linker=clang", "-C", "link-arg=-fuse-ld=lld"]
