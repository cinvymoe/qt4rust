# ModbusTcp 传感器配置
# 配置驱动的传感器定义 - 支持动态添加任意传感器

[global]
mode = "modbus_tcp"

[server]
host = "192.168.110.62"
port = 502
timeout_ms = 1000

# ========== 模拟传感器 ==========

# 主钩重量传感器
[sensors.main_hook_weight]
name = "主钩重量"
type = "analog"
description = "主钩载荷传感器"
slave_id = 1
register_address = 0
register_count = 1
data_type = "UInt16"
byte_order = "BigEndian"

# 副钩重量传感器
[sensors.aux_hook_weight]
name = "副钩重量"
type = "analog"
description = "副钩载荷传感器"
slave_id = 1
register_address = 3
register_count = 1
data_type = "UInt16"
byte_order = "BigEndian"

# 半径传感器
[sensors.radius]
name = "半径传感器"
type = "analog"
description = "工作半径传感器"
slave_id = 1
register_address = 1
register_count = 1
data_type = "UInt16"
byte_order = "BigEndian"

# 角度传感器
[sensors.angle]
name = "角度传感器"
type = "analog"
description = "吊臂角度传感器"
slave_id = 1
register_address = 2
register_count = 1
data_type = "UInt16"
byte_order = "BigEndian"

# ========== 数字输入 ==========

# 主钩勾头开关
[sensors.main_hook_switch]
name = "主钩勾头开关"
type = "digital"
description = "主钩勾头开关状态"
slave_id = 1
register_address = 10
register_count = 1
data_type = "UInt16"
byte_order = "BigEndian"

# 副钩勾头开关
[sensors.aux_hook_switch]
name = "副钩勾头开关"
type = "digital"
description = "副钩勾头开关状态"
slave_id = 1
register_address = 11
register_count = 1
data_type = "UInt16"
byte_order = "BigEndian"

# ========== 数字输入配置（模拟器用）==========

[digital_input]
source_type = "simulator"
toggle_interval_secs = 10
