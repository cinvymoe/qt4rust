# 起重机报警阈值配置文件
# 自动生成于: 2026-03-20
#
# 说明：
# 本文件包含所有报警阈值参数，用于判断起重机是否处于危险状态
# 这些阈值可以根据实际工况动态调整

# ========== 角度报警阈值 ==========
[angle]
# 预警值（度）
# 当吊臂角度达到此值时，系统将发出预警
warning = 75.0
# 报警值（度）
# 当吊臂角度达到此值时，系统将发出报警
alarm = 85.0

# ========== 力矩报警阈值 ==========
[moment]
# 预警百分比（%）
# 当实际力矩达到额定力矩的此百分比时，系统将发出预警
warning_percentage = 90.0
# 报警百分比（%）
# 当实际力矩达到额定力矩的此百分比时，系统将发出报警
alarm_percentage = 100.0