# 起重机报警阈值配置文件
# 自动生成于: 2026-03-20
#
# 说明：
# 本文件包含所有报警阈值参数，用于判断起重机是否处于危险状态
# 这些阈值可以根据实际工况动态调整

# ========== 力矩报警阈值 ==========
[moment]
# 预警百分比（%）
# 当实际力矩达到额定力矩的此百分比时，系统将发出预警
warning_percentage = 90.0
# 报警百分比（%）
# 当实际力矩达到额定力矩的此百分比时，系统将发出报警
alarm_percentage = 100.0

# ========== 角度报警阈值 ==========
[angle]
# 最小角度报警（度）
# 当吊臂角度小于此值时，系统将发出报警
min_angle = 0.0
# 最大角度报警（度）
# 当吊臂角度大于此值时，系统将发出报警
max_angle = 85.0

# ========== 主钩勾头开关报警 ==========
[main_hook_switch]
# 报警模式：none | normally_open | normally_closed
# none         = 不启用报警
# normally_open   = 当开关处于常开状态时报警
# normally_closed = 当开关处于常闭状态时报警
mode = "normally_closed"

# ========== 副钩勾头开关报警 ==========
[aux_hook_switch]
# 报警模式：none | normally_open | normally_closed
# none         = 不启用报警
# normally_open   = 当开关处于常开状态时报警
# normally_closed = 当开关处于常闭状态时报警
mode = "normally_closed"