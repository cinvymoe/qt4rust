# 报警管理配置文件
# 自动生成于: 2026-04-10
#
# 说明：
# 本文件包含所有报警类型的配置参数
# 支持多种报警类型，可独立启用/禁用
#
# 报警类型：
# - moment: 力矩报警
# - angle: 角度报警
# - load_overload: 载荷超限报警
# - main_hook_switch: 主钩勾头开关报警
# - aux_hook_switch: 副钩勾头开关报警

# 力矩报警配置
[moment]
# 预警阈值（%）
warning_threshold = 90.0
# 危险阈值（%）
danger_threshold = 100.0

# 角度报警配置
[angle]
# 最小角度（度）
min_angle = 0.0
# 最大角度（度）
max_angle = 85.0

# 载荷超限报警配置
[load_overload]
# 最大载荷（吨）
max_load = 50.0

# 防抖配置
[debounce]
# 报警触发防抖次数（连续多少次才触发报警）
trigger_count = 5
# 报警解除防抖次数（连续多少次才解除报警）
clear_count = 10
# 是否启用防抖
enabled = true

# 报警启用状态
[enabled_alarms]
# 力矩报警（默认启用）
moment = true
# 角度报警（默认禁用）
angle = false
# 载荷超限报警（默认禁用）
load_overload = false
# 主钩勾头开关报警（默认禁用）
main_hook_switch = false
# 副钩勾头开关报警（默认禁用）
aux_hook_switch = false
