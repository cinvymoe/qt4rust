# 起重机传感器标定配置文件
# 配置驱动格式 - 支持动态添加任意传感器标定参数
#
# 说明：
# 本文件包含所有传感器的标定参数，用于将 AD 采集值转换为物理值
# 转换公式: 物理值 = 零点物理值 + (AD值 - 零点AD) × (放大物理值 - 零点物理值) / (放大AD - 零点AD)

# ========== 重量传感器标定参数 ==========

# 主钩重量传感器
[main_hook_weight]
zero_ad = 0.0
zero_value = 0.0
scale_ad = 4095.0
scale_value = 50.0
multiplier = 1
actual_multiplier = 1

# 副钩重量传感器
[aux_hook_weight]
zero_ad = 0.0
zero_value = 0.0
scale_ad = 4095.0
scale_value = 25.0
multiplier = 1
actual_multiplier = 1

# ========== 角度传感器标定参数 ==========

[angle]
zero_ad = 0.0
zero_value = 0.0
scale_ad = 4095.0
scale_value = 90.0

# ========== 半径传感器标定参数 ==========

[radius]
zero_ad = 0.0
zero_value = 0.0
scale_ad = 4095.0
scale_value = 20.0

# 兼容旧配置名称
[weight]
zero_ad = 0.0
zero_value = 0.0
scale_ad = 4095.0
scale_value = 50.0
multiplier = 1
actual_multiplier = 1
